apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "bloguser"
            - name: POSTGRES_PASSWORD
              value: "blogpassword"
            - name: POSTGRES_DB
              value: "blogdb"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - bloguser
                - -d
                - blogdb
            initialDelaySeconds: 10
            periodSeconds: 5
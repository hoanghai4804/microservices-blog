name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Lint & Format ───────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check --diff backend/

      - name: Check import sorting with isort
        run: isort --check-only --diff backend/

      - name: Lint with flake8
        run: |
          flake8 backend/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503 \
            --exclude=backend/venv,backend/alembic

  # ─── JOB 2: Tests (chạy song song với lint) ─────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  # ─── JOB 3: Build Docker (chỉ chạy sau khi lint+test pass) ──
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: microservices-blog-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: microservices-blog-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
